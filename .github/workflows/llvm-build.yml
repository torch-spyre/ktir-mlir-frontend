name: LLVM Build

on:
  push:
    branches: [main]
    paths:
      # NOTE: for now we will not have this file checked into the repo
      # - so all tests on this workflow will be limited to dispatch for the moment
      - cmake/llvm-hash.txt
  pull_request:
    paths:
      - .github/workflows/llvm-build.yml
  workflow_dispatch:
    inputs:
      llvm-hash:
        description: "Full 40-character LLVM commit SHA to build (overrides cmake/llvm-hash.txt)"
        required: false
        type: string

env:
  SCCACHE_DIR: ${{ github.workspace }}/sccache

jobs:

  # Read the pinned LLVM commit once so all downstream jobs share the same value.
  get-hash:
    runs-on: ubuntu-22.04
    outputs:
      llvm-hash:       ${{ steps.read.outputs.llvm-hash }}
      llvm-short-hash: ${{ steps.read.outputs.llvm-short-hash }}
    steps:
      - uses: actions/checkout@v4

      - name: Read LLVM commit hash
        id: read
        run: |
          # workflow_dispatch input takes precedence over the pinned file.
          # If neither is present, fall back to empty string — downstream jobs
          # that need a hash (build) will skip; jobs that don't (trigger-ci
          # with mlir_wheel) are unaffected.
          LLVM_HASH="${{ inputs.llvm-hash }}"
          if [ -z "$LLVM_HASH" ]; then
            LLVM_HASH=$(cat cmake/llvm-hash.txt 2>/dev/null || echo "")
          fi
          echo "llvm-hash=$LLVM_HASH"             >> $GITHUB_OUTPUT
          echo "llvm-short-hash=${LLVM_HASH:0:8}" >> $GITHUB_OUTPUT

  build:
    name: Build LLVM (${{ matrix.config.runner }})
    needs: get-hash
    if: ${{ needs.get-hash.outputs.llvm-hash != '' }}
    runs-on: ${{ matrix.config.runs-on }}

    strategy:
      fail-fast: true
      matrix:
        config:
          - { runner: "Ubuntu 22.04 x64",   runs-on: "ubuntu-22.04",     os: "ubuntu", arch: "x64"   }
          # ubuntu-22.04-arm is a GitHub-hosted runner; requires Team or Enterprise plan
          # - { runner: "Ubuntu 22.04 ARM64",  runs-on: "ubuntu-22.04-arm", os: "ubuntu", arch: "arm64" }

    steps:
      - uses: actions/checkout@v4

      - name: Set artifact name
        run: |
          echo "LLVM_INSTALL_DIR=llvm-${{ needs.get-hash.outputs.llvm-short-hash }}-${{ matrix.config.os }}-${{ matrix.config.arch }}" >> $GITHUB_ENV

      - name: Checkout LLVM
        uses: actions/checkout@v4
        with:
          repository: llvm/llvm-project
          path: llvm-project
          ref: ${{ needs.get-hash.outputs.llvm-hash }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install prerequisites
        run: |
          uv sync --group llvm-build --no-install-project
          echo "$GITHUB_WORKSPACE/.venv/bin" >> $GITHUB_PATH

      - name: Enable sccache
        uses: actions/cache@v4
        with:
          path: ${{ env.SCCACHE_DIR }}
          key:          ${{ matrix.config.os }}-${{ matrix.config.arch }}-${{ needs.get-hash.outputs.llvm-short-hash }}
          restore-keys: ${{ matrix.config.os }}-${{ matrix.config.arch }}-
          save-always: true

      # MLIR_ENABLE_BINDINGS_PYTHON=ON exports MLIRPythonSources.Core and related
      # cmake targets into the install tree. These are required by downstream
      # consumers (cmake-py-test) to build the ktir Python wheel via scikit-build-core.
      - name: Configure LLVM
        run: >
          cmake -GNinja -B llvm-project/build
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_C_COMPILER=clang
          -DCMAKE_CXX_COMPILER=clang++
          -DCMAKE_C_COMPILER_LAUNCHER=sccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=sccache
          -DCMAKE_INSTALL_PREFIX="${{ env.LLVM_INSTALL_DIR }}"
          -DLLVM_ENABLE_PROJECTS="mlir;llvm"
          -DLLVM_TARGETS_TO_BUILD="host"
          -DLLVM_BUILD_UTILS=ON
          -DLLVM_INSTALL_UTILS=ON
          -DLLVM_ENABLE_ASSERTIONS=ON
          -DLLVM_ENABLE_ZSTD=OFF
          -DMLIR_ENABLE_BINDINGS_PYTHON=ON
          llvm-project/llvm

      - name: Build, test, and install LLVM
        run: ninja -C llvm-project/build check-mlir install

      - name: Package
        run: tar czf "${{ env.LLVM_INSTALL_DIR }}.tar.gz" "${{ env.LLVM_INSTALL_DIR }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.LLVM_INSTALL_DIR }}
          path: ${{ env.LLVM_INSTALL_DIR }}.tar.gz
          # Artifacts are only needed to pass to ci.yml immediately after this
          # workflow completes. 3 days covers manual reruns without accumulating
          # storage over the 90-day default.
          retention-days: 3
          # Without overwrite, re-running with the same hash creates duplicate
          # artifacts with the same name. download-artifact@v4 then becomes
          # ambiguous when triggered outside of this workflow (e.g. workflow_dispatch
          # on ci.yml). overwrite keeps exactly one artifact per hash/os/arch.
          overwrite: true

      - name: Dump sccache statistics
        run: sccache --show-stats

  # Trigger CI against the freshly built LLVM artifact.
  # Only runs when a hash was resolved — ci.yml already runs independently
  # on push/PR with mlir_wheel, so triggering it here with mlir_wheel would
  # be a duplicate.
  trigger-ci:
    needs: [get-hash, build]
    if: ${{ needs.get-hash.outputs.llvm-hash != '' }}
    uses: ./.github/workflows/ci.yml
    with:
      mlir-source:     custom
      llvm-short-hash: ${{ needs.get-hash.outputs.llvm-short-hash }}
      artifact-repo:   ${{ github.repository }}
