name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      mlir-source:
        description: "MLIR source"
        required: false
        default: mlir_wheel
        type: choice
        options:
          - mlir_wheel
          - custom
      llvm-short-hash:
        description: "First 8 characters of the LLVM commit SHA (required when mlir-source=custom)"
        required: false
        type: string
  workflow_call:
    inputs:
      mlir-source:
        description: "MLIR source"
        required: false
        default: mlir_wheel
        type: string
      llvm-short-hash:
        description: "Short LLVM commit hash (required when mlir-source=custom)"
        required: false
        type: string
      artifact-repo:
        description: "Repo to search for the LLVM artifact (owner/repo). When set
          (e.g. by trigger-ci), the artifact is fetched from that repo directly.
          When unset, falls back to the parent repo — the normal path for fork PRs
          whose parent holds the canonical LLVM artifacts."
        required: false
        type: string

jobs:

  # ── CMake build + lit tests + Python wheel build + pytest ─────────────────

  cmake-py-test:
    name: cmake-py-test (${{ matrix.config.runner }})
    runs-on: ${{ matrix.config.runs-on }}

    strategy:
      fail-fast: false
      matrix:
        config:
          - { runner: "Ubuntu 22.04 x64",   runs-on: "ubuntu-22.04",     os: "ubuntu", arch: "x64"   }
          - { runner: "macOS 15 ARM64",      runs-on: "macos-15",         os: "macos",  arch: "arm64" }
          - { runner: "Ubuntu 22.04 ARM64",  runs-on: "ubuntu-22.04-arm", os: "ubuntu", arch: "arm64" }

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      # ── Resolve artifact repo ───────────────────────────────────────────────
      # For workflow_call (trigger-ci): use inputs.artifact-repo directly.
      # For push/PR/workflow_dispatch from a fork: query the GitHub API to find
      # the parent repo, which holds the canonical LLVM artifacts.

      - name: Resolve artifact repo
        id: config
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ inputs.artifact-repo }}" ]; then
            ARTIFACT_REPO="${{ inputs.artifact-repo }}"
          else
            ARTIFACT_REPO=$(curl -sf \
              -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}" \
              | jq -r '.parent.full_name // .full_name')
          fi
          echo "artifact-repo=${ARTIFACT_REPO}" >> $GITHUB_OUTPUT

      # ── Install Python dependencies ──────────────────────────────────────────
      # Run before Set up MLIR so the venv exists if the wheel fallback fires.

      - name: Install Python deps
        run: |
          uv sync --no-install-project --extra test
          echo "LIT=$(uv run --no-project which lit)" >> $GITHUB_ENV

      # ── Set up MLIR ─────────────────────────────────────────────────────────
      # setup_mlir.py handles all three flows:
      #   Flow 1/2 (custom artifact): reads cmake/llvm-hash.txt, downloads artifact,
      #            exits with an error if artifact unavailable
      #   Flow 3   (bleeding-edge):   --wheel installs mlir_wheel directly

      - name: Set up MLIR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          WHEEL_FLAG=""
          if [ "${{ inputs.mlir-source }}" = "mlir_wheel" ]; then
            WHEEL_FLAG="--wheel"
          else
            echo "::notice::MLIR source: custom artifact from ${{ steps.config.outputs.artifact-repo }}." \
              "If the artifact is not found the build will fail." \
              "Note: when testing llvm-build on a fork, workflow_call always resolves artifact-repo" \
              "to the parent repo so fork-built artifacts won't be found." \
              "Use workflow_dispatch and pass artifact-repo pointing to your fork to override."
          fi
          # Pass --hash when provided (workflow_dispatch override or trigger-ci
          # with a hash that differs from cmake/llvm-hash.txt).
          HASH_FLAG=""
          if [ -n "${{ inputs.llvm-short-hash }}" ]; then
            HASH_FLAG="--hash ${{ inputs.llvm-short-hash }}"
          fi
          MLIR_DIR=$(uv run --no-project python scripts/setup_mlir.py \
            $WHEEL_FLAG \
            $HASH_FLAG \
            --repo ${{ steps.config.outputs.artifact-repo }})
          echo "MLIR_DIR=${MLIR_DIR}" >> $GITHUB_ENV

      # ── Build ────────────────────────────────────────────────────────────────

      - name: Configure
        run: |
          cmake -S . -B build -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DKTIR_ENABLE_PYTHON_BINDINGS=OFF \
            -DMLIR_DIR=${{ env.MLIR_DIR }} \
            -DLLVM_EXTERNAL_LIT=${{ env.LIT }} \
            -DLLVM_LIT_ARGS="-v"  # -v prints each test result; omit -s (succinct) as it suppresses per-test lines

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        run: cmake --build build --target check-ktir

      # ── Python wheel build + pytest ─────────────────────────────────────────
      # Installs the project as a Python wheel (scikit-build-core drives cmake
      # with Python bindings ON).  MLIR_DIR is already resolved above; we pass
      # it via CMAKE_ARGS so both mlir_wheel and custom LLVM paths are uniform.

      - name: Build and install Python wheel
        run: CMAKE_ARGS="-DMLIR_DIR=${{ env.MLIR_DIR }}" uv sync --extra test

      - name: Python test
        run: uv run --no-project pytest -v python/test/  # -v prints each test id and result
